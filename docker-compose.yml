# =====================
# DOCKER COMPOSE CONFIGURATION
# =====================
#
# This file defines a multi-container Docker application for a Django blog site.
# It orchestrates two services: PostgreSQL database and Django web application.
#
# To start all services: docker-compose up -d
# To stop all services:   docker-compose down
# To rebuild images:      docker-compose up --build
# To view logs:           docker-compose logs -f [service_name]
# To execute commands:    docker-compose exec web python manage.py ...

# =====================
# SERVICES DEFINITION
# =====================

services:
  
  # ----- POSTGRESQL DATABASE SERVICE -----
  db:
    # Use official PostgreSQL 16 image from Docker Hub
    # This image provides a pre-configured PostgreSQL database server
    image: postgres:16
    
    # Set a fixed container name for easy reference
    # Allows using `docker logs my_site_db` or `docker exec -it my_site_db bash`
    container_name: my_site_db
    
    # Environment variables passed to the PostgreSQL container
    # These configure the default database and user on first startup
    environment:
      POSTGRES_DB: blog          # Name of the default database (created at init)
      POSTGRES_USER: blog        # Superuser username for database access
      POSTGRES_PASSWORD: StrongPass123!  # Superuser password (use strong password in production)
    
    # Port mapping: host_port:container_port
    # Maps container's PostgreSQL port 5432 to host port 5550
    # Why 5550? Avoids conflict with local PostgreSQL installation (usually 5432)
    # Access from host: psql -h localhost -p 5550 -U blog -d blog
    ports:
      - "5550:5432"
    
    # Persistent storage configuration
    # Creates a Docker volume named 'postgres_data' to store database files
    # This ensures data survives container removal/restarts
    # Data is stored in Docker's volume directory: /var/lib/docker/volumes/...
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Health check ensures the database is ready before web service starts
    # Prevents web container from attempting connections before DB is ready
    healthcheck:
      # Command to test if PostgreSQL is accepting connections
      # pg_isready is a PostgreSQL utility that checks connection readiness
      # -U blog specifies the username, -d blog specifies the database name
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      
      # How often to perform the health check (every 5 seconds)
      interval: 5s
      
      # Maximum time allowed for a single health check to complete
      timeout: 5s
      
      # Number of consecutive failures needed to consider container unhealthy
      retries: 10


  # ----- DJANGO WEB APPLICATION SERVICE -----
  web:
    # Build Docker image using Dockerfile in current directory (.)
    # The Dockerfile should define how to build the Django application
    build: .
    
    # Set a fixed container name for easy reference
    container_name: my_site_web
    
    # Command to run when container starts
    # This overrides the default command from Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    # Breakdown of command:
    #   sh -c                               - Run a shell command
    #   "python manage.py migrate"          - Run database migrations (applies model changes)
    #   &&                                  - Run next command only if previous succeeded
    #   python manage.py runserver 0.0.0.0:8000" - Start Django development server
    
    # Environment variables passed to the web container
    # These configure Django settings and database connection
    environment:
      RUNNING_IN_DOCKER: "1"     # Flag to detect Docker environment (used in settings.py)
                                 # Allows conditional configuration (e.g., different host settings)
      
      DB_NAME: blog              # Database name (must match POSTGRES_DB above)
      DB_USER: blog              # Database user (must match POSTGRES_USER above)
      DB_PASSWORD: StrongPass123!  # Database password (must match POSTGRES_PASSWORD above)
      DB_HOST: db                # Database host (service name from docker-compose)
                                 # Docker DNS resolves 'db' to the PostgreSQL container
      DB_PORT: 5432              # Database port (default PostgreSQL port inside container)
      
      DEBUG: "True"              # Enable Django debug mode (development only)
                                 # Set to "False" in production
      
      ALLOWED_HOSTS: localhost,127.0.0.1  # Hosts that Django will accept requests from
                                          # Multiple hosts separated by commas
    
    # Volume mapping: host_path:container_path
    # Mounts current directory (.) to /app inside container
    # This allows live code reloading - changes on host are reflected in container
    # Without this, you'd need to rebuild the image for every code change
    volumes:
      - .:/app
    
    # Port mapping: host_port:container_port
    # Maps container's Django port 8000 to host port 8001
    # Why 8001? Avoids conflict if port 8000 is already in use
    # Access the site at: http://localhost:8001/
    ports:
      - "8001:8000"
    
    # Dependency configuration - controls startup order
    depends_on:
      db:
        condition: service_healthy  # Wait for PostgreSQL health check to pass
                                    # Web container starts ONLY after DB is ready
                                    # Prevents connection refused errors


# =====================
# VOLUMES DEFINITION
# =====================

volumes:
  postgres_data:
    # Declares the volume used by the db service for persistent storage
    # Docker creates a named volume that persists even after containers are removed
    # To delete this volume (and lose all database data): docker-compose down -v
    # Other volume options (not used here):
    #   external: true  - Use an existing volume (not create a new one)
    #   name: custom_name - Specify a custom volume name


# =====================
# SERVICE COMMUNICATION DIAGRAM
# =====================
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              HOST MACHINE                                  │
# │  ┌─────────────────────────────────────────────────────────────────────┐   │
# │  │                          DOCKER NETWORK                             │   │
# │  │                                                                      │   │
# │  │   ┌─────────────────┐                    ┌─────────────────┐        │   │
# │  │   │      db         │                    │      web        │        │   │
# │  │   │  postgres:16    │◄───────────────────│   Django app    │        │   │
# │  │   │                 │    db:5432         │                 │        │   │
# │  │   │  Port: 5432     │                    │  Port: 8000     │        │   │
# │  │   └────────┬────────┘                    └────────┬────────┘        │   │
# │  │            │                                      │                  │   │
# │  │            │ 5550:5432                           │ 8001:8000        │   │
# │  │            ▼                                      ▼                  │   │
# │  └────────────┼──────────────────────────────────────┼──────────────────┘   │
# │               │                                      │                      │
# │               │                              ┌───────┴───────┐              │
# │               │                              │  localhost   │              │
# │               │                              │   Browser    │              │
# │               │                              └───────────────┘              │
# │               │                                                             │
# │     ┌─────────┴─────────┐                                                   │
# │     │  psql -h localhost│                                                   │
# │     │  -p 5550 -U blog  │                                                   │
# │     └───────────────────┘                                                   │
# └─────────────────────────────────────────────────────────────────────────────┘


# =====================
# USEFUL DOCKER COMPOSE COMMANDS
# =====================
#
# Start all services in detached mode (background):
#   docker-compose up -d
#
# Start services with logs visible (foreground):
#   docker-compose up
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes (delete database):
#   docker-compose down -v
#
# Rebuild images after Dockerfile changes:
#   docker-compose up --build
#
# View logs for a specific service:
#   docker-compose logs -f web
#
# Execute command inside running container:
#   docker-compose exec web python manage.py createsuperuser
#
# Open a shell inside container:
#   docker-compose exec web bash
#
# Check status of all services:
#   docker-compose ps
#
# View resource usage:
#   docker stats


# =====================
# ENVIRONMENT-SPECIFIC CONFIGURATIONS (not in this file)
# =====================
#
# For production, you might want:
#
# 1. Use environment variables from .env file:
#    environment:
#      - DB_PASSWORD=${DB_PASSWORD}
#    Create .env file with: DB_PASSWORD=SecurePass123!
#
# 2. Use a production WSGI server instead of runserver:
#    command: gunicorn my_site.wsgi:application --bind 0.0.0.0:8000
#
# 3. Add nginx reverse proxy:
#    nginx:
#      image: nginx:alpine
#      ports:
#        - "80:80"
#      volumes:
#        - ./nginx.conf:/etc/nginx/conf.d/default.conf
#
# 4. Add Redis for caching:
#    redis:
#      image: redis:alpine
#
# 5. Use separate Dockerfile for production:
#    build:
#      context: .
#      dockerfile: Dockerfile.prod


# =====================
# TROUBLESHOOTING
# =====================
#
# 1. Port already in use (error: bind address already in use)
#    → Change host port: "5551:5432" or "8002:8000"
#    → Or stop the process using the port: netstat -ano | findstr :8001
#
# 2. Database connection refused (web can't connect to db)
#    → Check healthcheck configuration
#    → Ensure depends_on uses condition: service_healthy
#    → Verify DB_HOST=db (service name, not localhost)
#
# 3. Password authentication failed
#    → Ensure DB_USER, DB_PASSWORD match POSTGRES_USER, POSTGRES_PASSWORD
#    → Remove volume and recreate: docker-compose down -v && docker-compose up
#
# 4. Migrations not applied
#    → Run manually: docker-compose exec web python manage.py migrate
#    → Check command in docker-compose.yml has migrate before runserver
#
# 5. Changes not reflected in code
#    → Verify volume mount: .:/app
#    → Restart web container: docker-compose restart web
#    → For Python code, runserver auto-reloads; for requirements.txt, rebuild
#
# 6. Health check failing
#    → Check pg_isready command syntax
#    → Verify database user and name are correct
#    → Increase retries or timeout values
#
# 7. Cannot connect to database from host (psql)
#    → Use port 5550: psql -h localhost -p 5550 -U blog -d blog
#    → Check that ports mapping is correct: "5550:5432"
#
# 8. Permission denied on mounted volume (Linux)
#    → Add user: "${UID}:${GID}" to service definition
#    → Or use :Z flag for SELinux: .:/app:Z


# =====================
# PRODUCTION READINESS CHECKLIST
# =====================
#
# ☐ Change DEBUG to "False"
# ☐ Use strong passwords (not "StrongPass123!")
# ☐ Use HTTPS (add nginx with SSL certificates)
# ☐ Use Gunicorn/uWSGI instead of runserver
# ☐ Set ALLOWED_HOSTS to actual domain name(s)
# ☐ Use environment variables from .env file (not hardcoded)
# ☐ Add database backup strategy
# ☐ Set up logging
# ☐ Configure proper health check endpoints
# ☐ Use Docker secrets for sensitive data
# ☐ Implement database connection pooling