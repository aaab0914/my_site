services:
  db:
    image: postgres:16
    container_name: my_site_db
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: StrongPass123!
    ports:
      - "5550:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: my_site_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      RUNNING_IN_DOCKER: "1"
      DB_NAME: blog
      DB_USER: blog
      DB_PASSWORD: StrongPass123!
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
